target-version = "py311"
line-length = 120
fix = true
src = ["src"]
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "venv",
  "__pycache__",
  "build",
  "dist",
]

[lint]
select = [
  "E",    # pycodestyle errors
  "W",    # pycodestyle warnings
  "F",    # pyflakes
  "I",    # isort
  "B",    # flake8-bugbear
  "UP",   # pyupgrade
  "N",    # pep8-naming
  "C4",   # flake8-comprehensions
  "SIM",  # flake8-simplify
  "RUF",  # Ruff-specific rules
]
ignore = [
  "E501", # handled by formatter
]
fixable = ["ALL"]
unfixable = []

[lint.per-file-ignores]
"__init__.py" = ["F401"]

[lint.isort]
combine-as-imports = true
known-first-party = ["src"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
